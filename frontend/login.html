<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emby 会员中心 - 登录</title>
  <script src="/assets/app.js"></script>
  <link rel="stylesheet" href="/assets/login.css">
</head>
<body>
  <div class="card">
    <div class="logo">Emby <span>会员中心</span></div>
    <div class="subtitle">登录以管理您的会员服务</div>
    <div class="tabs">
      <div class="tab active" data-tab="login">登录</div>
      <div class="tab" data-tab="register">注册</div>
    </div>

    <!-- 登录表单 -->
    <div class="form active" id="form-login">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="login-username" placeholder="请输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="login-password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <button class="btn" id="login-btn">登 录</button>
      <div class="error-msg" id="login-error"></div>
    </div>

    <!-- 注册表单 -->
    <div class="form" id="form-register">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="reg-username" placeholder="请输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="reg-password" placeholder="请输入密码" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="reg-confirm" placeholder="请再次输入密码" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>邮箱（可选）</label>
        <input type="email" id="reg-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label>邀请码（可选）</label>
        <input type="text" id="reg-invite-code" placeholder="有邀请码可填写">
      </div>
      <button class="btn" id="reg-btn">注 册</button>
      <div class="error-msg" id="reg-error"></div>
    </div>
  </div>

  <script src="/assets/login.js"></script>
</body>
</html>
