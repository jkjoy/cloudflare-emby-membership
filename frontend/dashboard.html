<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emby 会员中心</title>
  <script src="/assets/app.js"></script>
  <link rel="stylesheet" href="/assets/dashboard.css">
</head>
<body>
  <nav class="navbar">
    <div class="logo">Emby <span>会员中心</span></div>
    <div class="user-menu">
      <span class="vip-badge inactive" id="vip-status">加载中...</span>
      <button class="btn-outline hidden" id="admin-btn">管理后台</button>
      <button class="btn-outline" id="logout-btn">退出登录</button>
    </div>
  </nav>

  <div class="container">
    <!-- VIP 状态 -->
    <div class="card">
      <div class="vip-icon" id="vip-icon">💎</div>
      <div class="status-grid">
        <div class="status-item">
          <div class="label">会员状态</div>
          <div class="value inactive" id="status-label">加载中...</div>
        </div>
        <div class="status-item">
          <div class="label">到期时间</div>
          <div class="value" id="expire-label">--</div>
        </div>
        <div class="status-item">
          <div class="label">剩余天数</div>
          <div class="value" id="days-label">--</div>
        </div>
      </div>
    </div>

    <!-- 兑换卡密 -->
    <div class="card" id="redeem-section">
      <div class="card-title">🎴 兑换卡密</div>
      <div class="redeem-row">
        <input type="text" id="code-input" placeholder="请输入卡密" autocomplete="off">
        <button class="btn" id="redeem-btn">兑 换</button>
      </div>
    </div>

    <!-- 激活 Emby 账号（兑换后显示） -->
    <div class="card hidden" id="activate-section">
      <div class="card-title">🚀 激活 Emby 账号</div>
      <p class="muted-copy">
        您已开通会员，点击下方按钮后系统会自动创建 Emby 账号并绑定当前会员。
      </p>
      <button class="btn btn-success" id="activate-btn">激活账号</button>
      <div id="activate-result" class="result-space"></div>
    </div>

    <!-- 已激活账号信息 -->
    <div class="card hidden" id="emby-info-section">
      <div class="card-title">✅ Emby 账号信息</div>
      <div class="emby-info" id="emby-info-content"></div>
    </div>

    <!-- 修改密码 -->
    <div class="card" id="change-password-section">
      <div class="card-title">🔐 修改登录密码</div>
      <p class="muted-copy">
        修改的是会员中心登录密码，不影响 Emby 账号密码。
      </p>
      <div class="form-row">
        <div class="form-group">
          <label>旧密码</label>
          <input type="password" id="old-password" placeholder="请输入当前登录密码">
        </div>
        <div class="form-group">
          <label>新密码</label>
          <input type="password" id="new-password" placeholder="至少 6 位">
        </div>
      </div>
      <button class="btn" id="change-password-btn">修改密码</button>
      <div id="change-password-result" class="result-space"></div>
    </div>

    <!-- 使用记录 -->
    <div class="card" id="history-section">
      <div class="card-title">📋 使用记录</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>日期</th><th>天数</th><th>来源</th><th>到期时间</th></tr>
          </thead>
          <tbody id="history-body">
            <tr><td colspan="4"><div class="empty-state"><div class="icon">📭</div>暂无使用记录</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/assets/dashboard.js"></script>
</body>
</html>
