<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emby 会员中心 - 管理后台</title>
  <script src="/assets/app.js"></script>
  <link rel="stylesheet" href="/assets/admin.css">
</head>
<body>
  <button class="menu-toggle" id="menuToggle">&#9776;</button>

  <aside class="sidebar" id="sidebar">
    <div class="logo">Emby <span>管理</span></div>
    <div class="nav">
      <div class="nav-item active" data-panel="dashboard">&#x1F4CA; 仪表盘</div>
      <div class="nav-item" data-panel="cards">&#x1F3B4; 卡密管理</div>
      <div class="nav-item" data-panel="users">&#x1F465; 用户管理</div>
      <div class="nav-item" data-panel="config">&#x2699;&#xFE0F; 系统配置</div>
    </div>
    <div class="nav-footer">
      <div class="nav-item" id="go-front-btn">&larr; 返回前台</div>
    </div>
  </aside>

  <div class="main" id="mainContent">
    <div class="panel active" id="panel-dashboard">
      <div class="page-title">&#x1F4CA; 仪表盘</div>
      <div class="card">
        <div class="card-title">系统概览</div>
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card"><div class="stat-num" id="stat-users">-</div><div class="stat-label">总用户数</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-members">-</div><div class="stat-label">会员数</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-cards">-</div><div class="stat-label">卡密总数</div></div>
          <div class="stat-card"><div class="stat-num" id="stat-used-cards">-</div><div class="stat-label">已用卡密</div></div>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-cards">
      <div class="page-title">&#x1F3B4; 卡密管理</div>
      <div class="card">
        <div class="card-title">生成卡密</div>
        <div class="form-row">
          <div class="form-group">
            <label>天数</label>
            <input type="number" id="gen-days" value="30" min="1" max="3650">
          </div>
          <div class="form-group">
            <label>数量</label>
            <input type="number" id="gen-count" value="1" min="1" max="100">
          </div>
          <div class="form-actions-end">
            <button class="btn" id="gen-btn">生成卡密</button>
          </div>
        </div>
        <div id="gen-result" class="result-space hidden">
          <div class="result-toolbar">
            <span class="success-strong">&#x2705; 生成成功</span>
            <button class="btn btn-sm btn-outline" id="copy-all-btn">&#x1F4CB; 一键复制全部</button>
          </div>
          <div id="codes-preview" class="codes-preview"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">卡密列表</div>
        <div class="filter-group" id="card-filters">
          <button class="filter-btn active" data-status="">全部</button>
          <button class="filter-btn" data-status="active">未使用</button>
          <button class="filter-btn" data-status="used">已使用</button>
          <button class="filter-btn" data-status="disabled">已禁用</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>ID</th><th>卡密</th><th>天数</th><th>状态</th><th>使用人</th><th>创建时间</th><th>操作</th></tr>
            </thead>
            <tbody id="card-table-body"><tr><td colspan="7"><div class="empty-state"><div class="icon">&#x1F4ED;</div>暂无数据</div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-users">
      <div class="page-title">&#x1F465; 用户管理</div>
      <div class="card">
        <div class="card-title">用户列表</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>ID</th><th>用户名</th><th>邮箱</th><th>Emby 绑定</th><th>会员状态</th><th>注册时间</th></tr>
            </thead>
            <tbody id="user-table-body"><tr><td colspan="6"><div class="empty-state"><div class="icon">&#x1F4ED;</div>暂无数据</div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-config">
      <div class="page-title">&#x2699;&#xFE0F; 系统配置</div>
      <div class="card">
        <div class="card-title">Emby 连接配置</div>
        <div class="form-group">
          <label>Emby 服务器地址</label>
          <input type="text" id="cfg-emby-url" placeholder="http://your-emby-server:8096">
        </div>
        <div class="form-group">
          <label>API Key</label>
          <input type="password" id="cfg-api-key" placeholder="请输入 Emby API Key">
        </div>
        <div class="form-group">
          <label>服务器线路（每行一条：名称|地址）</label>
          <textarea id="cfg-server-lines" placeholder="主线路|https://emby.example.com
备用线路|https://backup.example.com"></textarea>
        </div>
        <div class="button-row">
          <button class="btn btn-outline" id="cfg-test-btn">测试连接</button>
          <button class="btn" id="cfg-save-btn">保存配置</button>
        </div>
        <div id="cfg-test-result" class="config-result"></div>
      </div>
      <div class="card">
        <div class="card-title">网站设置</div>
        <div class="form-group">
          <label>网站标题</label>
          <input type="text" id="cfg-site-title" placeholder="Emby 会员中心">
        </div>
        <button class="btn" id="cfg-title-btn">保存标题</button>
      </div>
    </div>
  </div>

  <script src="/assets/admin.js"></script>
</body>
</html>
